<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能助手配置 - 雨姗AI收银助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 24px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 2px solid #f0f0f0;
            flex-wrap: wrap;
        }
        .back-btn {
            background: #f0f4ff;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
            transition: all 0.3s;
        }
        .back-btn:hover { background: #667eea; color: white; }
        .header h1 { font-size: 28px; color: #1a1a2e; flex: 1; }
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .status-badge.enabled { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
        .status-badge.disabled { background: #e0e0e0; color: #666; }
        .section { margin-bottom: 32px; }
        .section-title { font-size: 18px; color: #1a1a2e; margin-bottom: 16px; font-weight: 700; }
        .provider-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }
        .provider-card {
            background: #f8f9ff;
            border: 3px solid transparent;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            text-align: center;
        }
        .provider-card:hover { border-color: #667eea; transform: translateY(-2px); }
        .provider-card.selected { border-color: #667eea; background: #eef2ff; }
        .provider-card.selected::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }
        .provider-icon { font-size: 40px; margin-bottom: 10px; }
        .provider-name { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
        .provider-desc { font-size: 11px; color: #7a7a9d; line-height: 1.4; }
        .form-group { margin-bottom: 18px; }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8eaf6;
            border-radius: 12px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-input:focus { outline: none; border-color: #667eea; }
        .form-hint { font-size: 12px; color: #7a7a9d; margin-top: 6px; }
        .btn-group { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #f0f4ff; color: #667eea; }
        .btn-secondary:hover { background: #eef2ff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .message {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
        .message.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .message.error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .message.show { display: block; }
        .preview-section {
            background: #f8f9ff;
            border-radius: 16px;
            padding: 24px;
            margin-top: 32px;
        }
        .preview-title { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }
        .test-conversation {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
        }
        .chat-bubble.user { background: #667eea; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-bubble.ai { background: #e8eaf6; color: #1a1a2e; align-self: flex-start; border-bottom-left-radius: 4px; }
        .feature-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #555;
        }
        .feature-item .icon { color: #11998e; font-size: 18px; }
        .provider-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .provider-tag {
            padding: 4px 10px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        .provider-tag.local { background: #e8f5e9; color: #388e3c; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <button class="back-btn" onclick="goBack()">← 返回后台</button>
                <h1>🤖 AI智能助手配置</h1>
                <div id="statusBadge" class="status-badge disabled">未启用</div>
            </div>

            <div id="messageBox" class="message"></div>

            <div class="section">
                <div class="section-title">✨ 智能回复优势</div>
                <div class="feature-list">
                    <div class="feature-item"><span class="icon">✓</span><span>自然口语化对话</span></div>
                    <div class="feature-item"><span class="icon">✓</span><span>智能理解上下文</span></div>
                    <div class="feature-item"><span class="icon">✓</span><span>记住历史对话</span></div>
                    <div class="feature-item"><span class="icon">✓</span><span>主动推荐菜品</span></div>
                    <div class="feature-item"><span class="icon">✓</span><span>专业应答FAQ</span></div>
                    <div class="feature-item"><span class="icon">✓</span><span>友好带表情回复</span></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">选择大模型提供商</div>
                <div class="provider-cards" id="providerCards">
                </div>
            </div>

            <div id="configForm" class="section" style="display: none;">
                <div class="section-title">填写配置信息</div>
                
                <div class="form-group">
                    <label class="form-label">API密钥 <span style="color: #c62828;">*</span></label>
                    <input type="password" id="apiKey" class="form-input" placeholder="请输入API密钥">
                    <div id="apiKeyHint" class="form-hint"></div>
                </div>

                <div class="form-group" id="secretKeyGroup" style="display: none;">
                    <label class="form-label">Secret密钥 <span style="color: #c62828;">*</span></label>
                    <input type="password" id="secretKey" class="form-input" placeholder="请输入Secret密钥">
                </div>

                <div class="form-group">
                    <label class="form-label">模型名称</label>
                    <input type="text" id="modelName" class="form-input" placeholder="留空使用默认模型">
                    <div id="modelHint" class="form-hint"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">API地址（可选）</label>
                    <input type="text" id="baseUrl" class="form-input" placeholder="留空使用默认地址">
                    <div class="form-hint">自定义API端点，支持本地部署模型</div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="testConnection()">🧪 测试连接</button>
                    <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
                </div>
            </div>

            <div id="currentConfig" class="section" style="display: none;">
                <div class="section-title">当前配置</div>
                <div id="configInfo" style="background: #f0f4ff; padding: 16px; border-radius: 12px;"></div>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="disableLLM()">🚫 关闭智能回复</button>
                </div>
            </div>

            <div id="previewSection" class="preview-section">
                <div class="preview-title">💬 智能回复效果预览</div>
                <div class="test-conversation">
                    <div class="chat-bubble user">你好，我想吃点好的</div>
                    <div class="chat-bubble ai">您好呀！😊 来到雨姗AI收银助手创味菜太对了！强烈推荐我们的招牌大鱼头泡饭，88元一份超大份，还有黄焖大甲鱼198元，都是桌桌必点的好菜～请问您几位用餐呢？我来帮您推荐合适的菜品！</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedProvider = null;
        const providerHints = {
            openai: { apiKey: '前往 <a href="https://platform.openai.com/api-keys" target="_blank">OpenAI平台</a> 获取API密钥', model: '默认：gpt-4o-mini' },
            qwen: { apiKey: '前往 <a href="https://dashscope.console.aliyun.com/apiKey" target="_blank">阿里云百炼</a> 获取API密钥', model: '默认：qwen-turbo（免费额度充足）' },
            wenxin: { apiKey: '前往 <a href="https://console.bce.baidu.com/wenxin/" target="_blank">百度智能云</a> 获取API密钥', model: '默认：ernie-4.0-turbo' },
            deepseek: { apiKey: '前往 <a href="https://platform.deepseek.com/api_keys" target="_blank">DeepSeek平台</a> 获取API密钥', model: '默认：deepseek-chat（免费额度高）' },
            moonshot: { apiKey: '前往 <a href="https://platform.moonshot.cn/console/api-keys" target="_blank">Moonshot平台</a> 获取API密钥', model: '默认：moonshot-v1-8k' },
            zhipu: { apiKey: '前往 <a href="https://open.bigmodel.cn/usercenter/apikeys" target="_blank">智谱开放平台</a> 获取API密钥', model: '默认：glm-4' },
            minimax: { apiKey: '前往 <a href="https://platform.minimax.chat/api-key" target="_blank">MiniMax平台</a> 获取API密钥', model: '默认：abab6-chat' },
            volcengine: { apiKey: '前往 <a href="https://console.bytedance.net/ark" target="_blank">火山引擎方舟</a> 获取API密钥', model: '默认：Doubao-7B-Chat' },
            youdao: { apiKey: '前往 <a href="https://ai.youdao.com/console/" target="_blank">有道AI开放平台</a> 获取API密钥', model: '默认：text-translation' },
            qianfan: { apiKey: '前往 <a href="https://cloud.baidu.com/product/wenxinworkshop" target="_blank">百度千帆</a> 获取API密钥', model: '默认：ernie-4.0-turbo' },
            ollama: { apiKey: '无需API密钥，在本地运行 <a href="https://ollama.com/" target="_blank">Ollama</a>', model: '默认：llama3' },
            lmstudio: { apiKey: '无需API密钥，使用 <a href="https://lmstudio.ai/" target="_blank">LM Studio</a> 本地运行', model: '默认：gpt-4o-mini' },
            stepfun: { apiKey: '前往 StepFun 官方平台获取API密钥', model: '默认：stepfun-chat' },
            xiaomi: { apiKey: '前往小米AI开放平台获取API密钥', model: '默认：mi-ai-chat' },
        };

        const providerIcons = {
            openai: '🤖', qwen: '🟣', wenxin: '🟢', deepseek: '🌊',
            moonshot: '🌙', zhipu: '🧠', minimax: '🔷', volcengine: '🔥',
            youdao: '📖', qianfan: '🚢', ollama: '🐑', lmstudio: '🎬',
            stepfun: '🚀', xiaomi: '📱'
        };

        const providerTags = {
            openai: ['海外', 'GPT'], qwen: ['国内', '免费'], wenxin: ['国内', '百度'],
            deepseek: ['国内', '免费'], moonshot: ['国内', 'Kimi'], zhipu: ['国内', 'GLM'],
            minimax: ['国内'], volcengine: ['国内', '抖音'], youdao: ['国内', '网易'],
            qianfan: ['国内', '百度'], ollama: ['本地', '免费'], lmstudio: ['本地', '免费'],
            stepfun: ['国内'], xiaomi: ['国内']
        };

        function goBack() { window.location.href = '/admin'; }

        async function loadProviders() {
            try {
                const response = await fetch('/api/v1/llm-config/providers');
                const result = await response.json();
                
                if (result.success) {
                    const cards = document.getElementById('providerCards');
                    result.providers.forEach(provider => {
                        const card = document.createElement('div');
                        card.className = 'provider-card';
                        card.dataset.provider = provider.id;
                        card.onclick = () => selectProvider(provider.id, provider.requiresSecret);
                        
                        const tags = providerTags[provider.id] || [];
                        const tagHtml = tags.map(t => `<span class="provider-tag ${t === '本地' ? 'local' : ''}">${t}</span>`).join('');
                        
                        card.innerHTML = `
                            <div class="provider-icon">${providerIcons[provider.id] || '🤖'}</div>
                            <div class="provider-name">${provider.name}</div>
                            <div class="provider-desc">${provider.requiresSecret ? '需要密钥对' : '单密钥'}</div>
                            <div class="provider-tags">${tagHtml}</div>
                        `;
                        cards.appendChild(card);
                    });
                }
            } catch (error) {
                console.error('加载提供商列表失败:', error);
            }
        }

        function selectProvider(providerId, requiresSecret) {
            selectedProvider = providerId;
            document.querySelectorAll('.provider-card').forEach(card => card.classList.remove('selected'));
            document.querySelector(`[data-provider="${providerId}"]`).classList.add('selected');
            
            document.getElementById('configForm').style.display = 'block';
            document.getElementById('secretKeyGroup').style.display = requiresSecret ? 'block' : 'none';
            
            const hints = providerHints[providerId] || {};
            document.getElementById('apiKeyHint').innerHTML = hints.apiKey || '请输入API密钥';
            document.getElementById('modelHint').textContent = hints.model || '留空使用默认模型';
            
            if (providerId === 'ollama' || providerId === 'lmstudio') {
                document.getElementById('apiKey').value = providerId;
                document.getElementById('apiKey').disabled = true;
            } else {
                document.getElementById('apiKey').disabled = false;
            }
        }

        async function loadStatus() {
            try {
                const response = await fetch('/api/v1/llm-config/status');
                const result = await response.json();
                
                if (result.success && result.data) {
                    const status = result.data;
                    const badge = document.getElementById('statusBadge');
                    
                    if (status.enabled) {
                        badge.className = 'status-badge enabled';
                        badge.textContent = '已启用';
                        document.getElementById('currentConfig').style.display = 'block';
                        document.getElementById('configInfo').innerHTML = `
                            <p><strong>当前提供商：</strong>${status.provider}</p>
                            <p><strong>模型：</strong>${status.providers[status.provider]?.model || '默认'}</p>
                        `;
                    } else {
                        badge.className = 'status-badge disabled';
                        badge.textContent = '未启用';
                    }
                }
            } catch (error) {
                console.error('加载状态失败:', error);
            }
        }

        async function testConnection() {
            if (!selectedProvider) {
                showMessage('请先选择一个提供商', 'error');
                return;
            }

            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey && selectedProvider !== 'ollama' && selectedProvider !== 'lmstudio') {
                showMessage('请填写API密钥', 'error');
                return;
            }

            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '测试中...';

            try {
                const response = await fetch('/api/v1/llm-config/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        provider: selectedProvider,
                        apiKey: apiKey || selectedProvider,
                        model: document.getElementById('modelName').value || null,
                        secretKey: document.getElementById('secretKey').value || null,
                        baseUrl: document.getElementById('baseUrl').value || null
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('✅ 连接成功！AI回复测试通过', 'success');
                } else {
                    showMessage('❌ ' + (result.message || '连接失败'), 'error');
                }
            } catch (error) {
                showMessage('❌ 测试失败：' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🧪 测试连接';
            }
        }

        async function saveConfig() {
            if (!selectedProvider) {
                showMessage('请先选择一个提供商', 'error');
                return;
            }

            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey && selectedProvider !== 'ollama' && selectedProvider !== 'lmstudio') {
                showMessage('请填写API密钥', 'error');
                return;
            }

            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '保存中...';

            try {
                const response = await fetch('/api/v1/llm-config/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        provider: selectedProvider,
                        apiKey: apiKey || selectedProvider,
                        model: document.getElementById('modelName').value || null,
                        secretKey: document.getElementById('secretKey').value || null,
                        baseUrl: document.getElementById('baseUrl').value || null
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('✅ 配置成功！商家端已启用智能AI回复功能', 'success');
                    loadStatus();
                } else {
                    showMessage('❌ ' + (result.message || '保存失败'), 'error');
                }
            } catch (error) {
                showMessage('❌ 保存失败：' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '💾 保存配置';
            }
        }

        async function disableLLM() {
            if (!confirm('确定要关闭智能AI回复功能吗？')) return;

            try {
                const response = await fetch('/api/v1/llm-config/disable', { method: 'POST' });
                const result = await response.json();

                if (result.success) {
                    showMessage('✅ 已关闭智能AI回复功能', 'success');
                    loadStatus();
                } else {
                    showMessage('❌ 操作失败', 'error');
                }
            } catch (error) {
                showMessage('❌ 操作失败：' + error.message, 'error');
            }
        }

        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.textContent = text;
            box.className = 'message ' + type + ' show';
            setTimeout(() => box.classList.remove('show'), 5000);
        }

        loadProviders();
        loadStatus();
    </script>
</body>
</html>
