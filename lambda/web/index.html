<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏邑缘品荟创味菜 - 智能餐饮助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .chat-container { height: 400px; overflow-y: auto; padding: 20px; background: #f5f5f5; }
        .message { margin-bottom: 15px; display: flex; }
        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }
        .message-content {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.6;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message.bot .message-content {
            background: white;
            color: #333;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 15px 20px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }
        .quick-btn {
            padding: 8px 15px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }
        .quick-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        .input-container {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }
        .input-container input {
            flex: 1;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        .input-container button {
            margin-left: 10px;
            padding: 15px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
        .typing { display: flex; gap: 5px; padding: 12px; }
        .typing span {
            width: 8px; height: 8px; background: #999; border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        .footer {
            text-align: center;
            padding: 15px;
            background: #f9f9f9;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍽️ 夏邑缘品荟创味菜</h1>
            <p>智能餐饮助手 - 开发者：石中伟</p>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="message bot">
                <div class="message-content">
                    👋 欢迎使用夏邑缘品荟创味菜！<br><br>
                    我可以帮您：<br>
                    🎯 智能推荐菜品<br>
                    📜 查看菜单<br>
                    📶 查询WiFi密码<br>
                    📱 扫码点餐<br>
                    🖨️ 打印服务<br>
                    🛵 外卖点餐<br>
                    📅 堂食预约<br><br>
                    请输入您的问题~
                </div>
            </div>
        </div>
        
        <div class="quick-actions">
            <button class="quick-btn" onclick="sendQuickMessage('推荐一道川菜')">推荐川菜</button>
            <button class="quick-btn" onclick="sendQuickMessage('WiFi密码是多少')">WiFi密码</button>
            <button class="quick-btn" onclick="sendQuickMessage('我要扫码下单')">扫码点餐</button>
            <button class="quick-btn" onclick="sendQuickMessage('给我看看菜单')">查看菜单</button>
        </div>
        
        <div class="input-container">
            <input type="text" id="messageInput" placeholder="输入您的问题..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">发送</button>
        </div>
        
        <div class="footer">
            夏邑缘品荟创味菜 · 开发者：石中伟 · © 2024
        </div>
    </div>
    
    <script>
        const API_URL = window.location.origin + '/agent/text';
        let isTyping = false;
        
        function addMessage(text, type) {
            const container = document.getElementById('chatContainer');
            const message = document.createElement('div');
            message.className = `message ${type}`;
            message.innerHTML = `<div class="message-content">${text.replace(/\n/g, '<br>')}</div>`;
            container.appendChild(message);
            container.scrollTop = container.scrollHeight;
        }
        
        function showTyping() {
            const container = document.getElementById('chatContainer');
            const typing = document.createElement('div');
            typing.id = 'typing';
            typing.className = 'message bot';
            typing.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            container.appendChild(typing);
            container.scrollTop = container.scrollHeight;
            isTyping = true;
        }
        
        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
            isTyping = false;
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || isTyping) return;
            
            addMessage(text, 'user');
            input.value = '';
            showTyping();
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, userId: 'web-user' })
                });
                const data = await response.json();
                hideTyping();
                if (data.success) {
                    addMessage(data.response, 'bot');
                } else {
                    addMessage('抱歉，服务出现问题。', 'bot');
                }
            } catch (error) {
                hideTyping();
                addMessage('网络错误，请检查连接后重试。', 'bot');
            }
        }
        
        function sendQuickMessage(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }
        
        document.getElementById('messageInput').focus();
    </script>
</body>
</html>
