<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雨姗AI收银助手 - 智能餐饮</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 80px 20px;
            text-align: center;
            color: white;
        }
        .hero h1 { font-size: 48px; margin-bottom: 15px; }
        .hero p { font-size: 18px; opacity: 0.9; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .feature {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .feature .icon { font-size: 48px; margin-bottom: 15px; }
        .feature h3 { color: #333; margin-bottom: 10px; font-size: 20px; }
        .feature p { color: #666; line-height: 1.6; font-size: 14px; }
        .cta-section {
            text-align: center;
            margin: 60px 0;
        }
        .cta-btn {
            display: inline-block;
            padding: 15px 40px;
            background: #667eea;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s;
            margin: 0 10px;
        }
        .cta-btn:hover { background: #5568d3; transform: translateY(-2px); }
        .cta-btn.success { background: #28a745; }
        .cta-btn.success:hover { background: #218838; }
        .footer {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>雨姗AI收银助手</h1>
        <p>V4.1.0 | 智能餐饮系统</p>
    </div>
    <div class="container">
        <div class="features">
            <div class="feature">
                <div class="icon">🛒</div>
                <h3>在线点餐</h3>
                <p>支持Web、移动端多渠道点餐，快捷方便</p>
            </div>
            <div class="feature">
                <div class="icon">🎤</div>
                <h3>语音点餐</h3>
                <p>支持语音识别，解放双手，提升效率</p>
            </div>
            <div class="feature">
                <div class="icon">🤖</div>
                <h3>AI智能助手</h3>
                <p>AI Agent对话点餐，24小时服务</p>
            </div>
            <div class="feature">
                <div class="icon">👥</div>
                <h3>会员系统</h3>
                <p>积分、优惠券、充值，完善的会员体系</p>
            </div>
            <div class="feature">
                <div class="icon">🎫</div>
                <h3>智能排队</h3>
                <p>排队叫号、实时查询，告别混乱</p>
            </div>
            <div class="feature">
                <div class="icon">💳</div>
                <h3>多种支付</h3>
                <p>微信、支付宝、余额支付，支持扫码</p>
            </div>
        </div>
        
        <div class="cta-section">
            <a href="/mobile" class="cta-btn">开始点餐</a>
            <a href="/admin" class="cta-btn success">管理后台</a>
        </div>
    </div>
    
    <div class="footer">
        <p>© 2026 雨姗科技. 雨姗AI收银助手 v4.1.0</p>
    </div>
</body>
</html>
