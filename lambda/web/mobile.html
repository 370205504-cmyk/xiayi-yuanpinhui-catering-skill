<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雨姗AI收银助手 - AI智能点餐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 20px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-avatar {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .header-info h1 { font-size: 16px; font-weight: 700; }
        .header-info p { font-size: 11px; opacity: 0.85; margin-top: 2px; }
        .header-actions { display: flex; gap: 8px; }
        .header-btn {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.2);
            border: none; border-radius: 50%;
            color: white; font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            animation: msgIn 0.3s ease;
            word-break: break-word;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.ai {
            align-self: flex-start;
            background: white;
            color: #1f2937;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.system {
            align-self: center;
            background: #e5e7eb;
            color: #6b7280;
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 20px;
        }
        .message .dish-card {
            background: #f9fafb;
            border-radius: 12px;
            padding: 12px;
            margin-top: 8px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .message .dish-card .emoji { font-size: 32px; }
        .message .dish-card .info { flex: 1; }
        .message .dish-card .name { font-weight: 700; font-size: 14px; }
        .message .dish-card .price { color: #667eea; font-weight: 700; font-size: 16px; margin-top: 4px; }
        .message .dish-card .add-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .quick-replies {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            overflow-x: auto;
            flex-shrink: 0;
            scrollbar-width: none;
        }
        .quick-replies::-webkit-scrollbar { display: none; }
        .quick-btn {
            flex-shrink: 0;
            padding: 8px 16px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            font-size: 13px;
            color: #374151;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .quick-btn:active { background: #667eea; color: white; border-color: #667eea; }
        .input-bar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #e5e7eb;
            flex-shrink: 0;
            align-items: flex-end;
        }
        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: flex-end;
            background: #f3f4f6;
            border-radius: 24px;
            padding: 4px 4px 4px 16px;
        }
        .input-wrapper textarea {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15px;
            outline: none;
            resize: none;
            max-height: 80px;
            line-height: 1.5;
            padding: 8px 0;
            font-family: inherit;
        }
        .input-wrapper .send-btn {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none; border-radius: 50%;
            color: white; font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .input-wrapper .send-btn:active { transform: scale(0.9); }
        .input-wrapper .send-btn:disabled { opacity: 0.5; }
        .typing {
            align-self: flex-start;
            background: white;
            padding: 14px 20px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .typing span {
            width: 8px; height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-4px); }
        }
        .menu-panel {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }
        .menu-panel.active { transform: translateX(0); }
        .menu-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .menu-header h2 { font-size: 18px; }
        .menu-close {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.2);
            border: none; border-radius: 50%;
            color: white; font-size: 20px;
            cursor: pointer;
        }
        .menu-body { flex: 1; overflow-y: auto; padding: 12px; }
        .menu-categories {
            display: flex; gap: 8px; overflow-x: auto;
            padding: 8px 0; margin-bottom: 12px;
            scrollbar-width: none;
        }
        .menu-categories::-webkit-scrollbar { display: none; }
        .menu-cat-btn {
            flex-shrink: 0;
            padding: 8px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            background: white;
            font-size: 13px;
            cursor: pointer;
        }
        .menu-cat-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .menu-dish {
            display: flex; gap: 12px; padding: 12px;
            border-bottom: 1px solid #f3f4f6;
            align-items: center;
        }
        .menu-dish .emoji { font-size: 36px; }
        .menu-dish .info { flex: 1; }
        .menu-dish .name { font-weight: 700; font-size: 15px; }
        .menu-dish .desc { font-size: 12px; color: #6b7280; margin-top: 4px; }
        .menu-dish .price { color: #667eea; font-weight: 700; font-size: 16px; margin-top: 4px; }
        .menu-dish .action-btn {
            padding: 8px 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none; border-radius: 8px;
            font-size: 13px; font-weight: 600;
            cursor: pointer;
        }
        .cart-panel {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }
        .cart-panel.active { transform: translateX(0); }
        .cart-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .cart-header h2 { font-size: 18px; }
        .cart-close {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.2);
            border: none; border-radius: 50%;
            color: white; font-size: 20px;
            cursor: pointer;
        }
        .cart-body { flex: 1; overflow-y: auto; padding: 12px; }
        .cart-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; border-bottom: 1px solid #f3f4f6;
        }
        .cart-item .name { flex: 1; font-weight: 600; }
        .cart-item .price { color: #667eea; font-weight: 700; }
        .cart-item .qty-control { display: flex; align-items: center; gap: 8px; }
        .cart-item .qty-btn {
            width: 28px; height: 28px;
            border-radius: 50%; border: 1px solid #e5e7eb;
            background: white; font-size: 16px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .cart-item .qty-num { min-width: 20px; text-align: center; font-weight: 600; }
        .cart-footer {
            padding: 16px 20px;
            border-top: 1px solid #e5e7eb;
            display: flex; align-items: center; gap: 12px;
        }
        .cart-footer .total { flex: 1; font-size: 18px; font-weight: 800; color: #667eea; }
        .cart-footer .total span { font-size: 13px; }
        .cart-footer .checkout-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 700; cursor: pointer;
        }
        .cart-footer .clear-btn {
            padding: 12px 16px;
            background: #f3f4f6; color: #6b7280;
            border: none; border-radius: 12px;
            font-size: 14px; cursor: pointer;
        }
        .cart-badge {
            position: absolute;
            top: -4px; right: -4px;
            background: #ef4444; color: white;
            font-size: 10px; font-weight: 800;
            padding: 2px 6px; border-radius: 10px;
            min-width: 18px; text-align: center;
        }
        .cart-btn-wrapper { position: relative; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="header-avatar">🤖</div>
            <div class="header-info">
                <h1>雨姗AI收银助手</h1>
                <p>在线 · 随时为您服务</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="toggleMenu()" title="菜单">📋</button>
            <button class="header-btn cart-btn-wrapper" onclick="toggleCart()" title="购物车">
                🛒
                <span class="cart-badge" id="cart-badge-header" style="display:none">0</span>
            </button>
        </div>
    </div>

    <div class="chat-container" id="chat-container"></div>

    <div class="quick-replies" id="quick-replies">
        <button class="quick-btn" onclick="sendQuick('给我看看菜单')">📋 看看菜单</button>
        <button class="quick-btn" onclick="sendQuick('推荐招牌菜')">⭐ 推荐招牌菜</button>
        <button class="quick-btn" onclick="sendQuick('WiFi密码')">📶 WiFi密码</button>
        <button class="quick-btn" onclick="sendQuick('营业时间')">🕐 营业时间</button>
        <button class="quick-btn" onclick="sendQuick('门店地址')">📍 门店地址</button>
        <button class="quick-btn" onclick="sendQuick('帮我排个3人桌')">🎫 排队取号</button>
    </div>

    <div class="input-bar">
        <div class="input-wrapper">
            <textarea id="chat-input" placeholder="和AI助手聊天点餐..." rows="1" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <div class="menu-panel" id="menu-panel">
        <div class="menu-header">
            <h2>📋 全部菜品</h2>
            <button class="menu-close" onclick="toggleMenu()">✕</button>
        </div>
        <div class="menu-categories" id="menu-categories"></div>
        <div class="menu-body" id="menu-body"></div>
    </div>

    <div class="cart-panel" id="cart-panel">
        <div class="cart-header">
            <h2>🛒 购物车</h2>
            <button class="cart-close" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-body" id="cart-body"></div>
        <div class="cart-footer">
            <button class="clear-btn" onclick="clearCart()">清空</button>
            <div class="total"><span>¥</span> <span id="cart-total-footer">0.00</span></div>
            <button class="checkout-btn" onclick="checkout()">去结算</button>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let sessionId = 'session-' + Date.now();
        let userId = 'user-' + Date.now();
        let cart = [];
        let dishes = [];
        let isProcessing = false;

        // 初始化
        async function init() {
            addMessage('ai', '👋 您好！我是雨姗AI收银助手的智能助手，很高兴为您服务！\n\n您可以这样和我聊天：\n• **"给我看看菜单"** - 浏览菜品\n• **"推荐招牌菜"** - 获取推荐\n• **"来一份宫保鸡丁"** - 直接点餐\n• **"WiFi密码"** - 查询服务信息\n• **"帮我排个3人桌"** - 排队取号\n\n有什么可以帮您的吗？😊');
            await loadDishes();
        }

        // 加载菜品
        async function loadDishes() {
            try {
                const res = await fetch(API_BASE + '/menu');
                const data = await res.json();
                if (data.success && data.data) {
                    dishes = data.data.dishes || data.data || [];
                }
            } catch(e) {
                dishes = [
                    { id: 1, name: '招牌鱼头泡饭', category: '招牌菜', price: 88, desc: '招牌菜，桌桌必点', isSignature: true, isRecommend: true, spicyLevel: 1, emoji: '🍲' },
                    { id: 2, name: '招牌烧肉', category: '招牌菜', price: 58, desc: '肥而不腻，软糯香甜', isSignature: true, isRecommend: true, spicyLevel: 0, emoji: '🍖' },
                    { id: 3, name: '酱焖娃娃鱼', category: '特色硬菜', price: 198, desc: '新鲜现杀，肉质鲜嫩', isSignature: false, isRecommend: true, spicyLevel: 2, emoji: '🐟' },
                    { id: 4, name: '酸辣土豆丝', category: '热菜', price: 22, desc: '酸辣爽口', isSignature: false, isRecommend: false, spicyLevel: 2, emoji: '🥔' },
                    { id: 5, name: '蒜蓉西兰花', category: '热菜', price: 26, desc: '健康营养', isSignature: false, isRecommend: false, spicyLevel: 0, emoji: '🥦' },
                    { id: 6, name: '凉拌黄瓜', category: '凉菜', price: 16, desc: '清爽开胃', isSignature: false, isRecommend: false, spicyLevel: 1, emoji: '🥒' },
                    { id: 7, name: '白米饭', category: '主食', price: 2, desc: '粒粒分明', isSignature: false, isRecommend: false, spicyLevel: 0, emoji: '🍚' },
                    { id: 8, name: '柠檬水', category: '饮品', price: 8, desc: '酸甜解渴', isSignature: false, isRecommend: false, spicyLevel: 0, emoji: '🍋' }
                ];
            }
            renderMenuCategories();
            renderMenuDishes();
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || isProcessing) return;
            input.value = '';
            autoResize(input);
            await processUserInput(text);
        }

        function sendQuick(text) {
            if (isProcessing) return;
            document.getElementById('chat-input').value = text;
            sendMessage();
        }

        async function processUserInput(text) {
            addMessage('user', text);
            showTyping();
            isProcessing = true;
            document.getElementById('send-btn').disabled = true;

            try {
                const res = await fetch(API_BASE + '/agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: text,
                        user_id: userId,
                        session_id: sessionId
                    })
                });
                const data = await res.json();
                hideTyping();

                if (data.success) {
                    addMessage('ai', data.reply);
                    if (data.actions) {
                        handleActions(data.actions);
                    }
                } else {
                    addMessage('ai', '😅 抱歉，我没有理解您的意思，能换种说法吗？');
                }
            } catch(e) {
                hideTyping();
                // 离线模式：本地处理
                const reply = localProcess(text);
                addMessage('ai', reply);
            }

            isProcessing = false;
            document.getElementById('send-btn').disabled = false;
        }

        // 本地处理（离线备用）
        function localProcess(text) {
            const lower = text.toLowerCase();
            if (lower.includes('菜单') || lower.includes('有什么菜') || lower.includes('看看')) {
                const list = dishes.map(d => `• ${d.emoji} **${d.name}** ¥${d.price}`).join('\n');
                return `📋 **全部菜品**\n\n${list}\n\n回复菜品名称即可添加到购物车 🛒`;
            }
            if (lower.includes('推荐') || lower.includes('招牌') || lower.includes('好吃')) {
                const rec = dishes.filter(d => d.isRecommend || d.isSignature).slice(0, 5);
                const list = rec.map((d, i) => `${i+1}. ${d.emoji} **${d.name}** ¥${d.price}\n   ${d.desc}`).join('\n\n');
                return `🌟 **为您推荐**\n\n${list}\n\n请问想点哪几道？直接说菜品名称即可`;
            }
            if (lower.includes('wifi') || lower.includes('密码') || lower.includes('无线')) {
                return '📶 **WiFi信息**\n\n名称：Yushan-Free\n密码：88888888\n\n免密码连接，祝您用餐愉快！';
            }
            if (lower.includes('营业') || lower.includes('几点')) {
                return '🕐 **营业时间**\n\n每天 09:00 - 22:00\n\n节假日可能有调整，欢迎光临！';
            }
            if (lower.includes('地址') || lower.includes('在哪') || lower.includes('怎么去')) {
                return '📍 **门店地址**\n\n河南省商丘市县府前路188号\n\n期待您的光临！';
            }
            if (lower.includes('电话') || lower.includes('联系')) {
                return '📞 **联系电话**\n\n0370-628-9999';
            }
            if (lower.includes('停车') || lower.includes('车位')) {
                return '🅿️ **停车信息**\n\n提供免费停车场，消费满100元免2小时';
            }
            if (lower.includes('排队') || lower.includes('取号') || lower.includes('排号')) {
                return '🎫 **排队取号**\n\n请到店取号，或联系前台帮您安排。\n\n当前等待人数较多，建议错峰用餐哦~';
            }
            if (lower.includes('来') || lower.includes('点') || lower.includes('要') || lower.includes('加')) {
                const match = text.match(/来?一?份?(.+?)(?:少辣|微辣|不要|加辣|$)/);
                if (match) {
                    const name = match[1].trim();
                    const dish = dishes.find(d => d.name.includes(name) || name.includes(d.name));
                    if (dish) {
                        cart.push({ id: dish.id, name: dish.name, price: dish.price, quantity: 1 });
                        updateCartUI();
                        return `✅ 已添加：**${dish.name}** ¥${dish.price}\n\n当前购物车共 ${cart.length} 件，说"下单"确认或继续点餐~`;
                    }
                }
                return '😅 没找到这道菜，您可以说"给我看看菜单"查看所有菜品';
            }
            if (lower.includes('购物车') || lower.includes('看看我点的')) {
                if (cart.length === 0) return '🛒 购物车是空的\n\n您可以说"给我看看菜单"开始点餐';
                const list = cart.map((item, i) => `${i+1}. ${item.name} x${item.quantity} ¥${(item.price * item.quantity).toFixed(2)}`).join('\n');
                const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
                return `🛒 **购物车**\n\n${list}\n\n合计：¥${total.toFixed(2)}\n\n说"下单"确认订单~`;
            }
            if (lower.includes('下单') || lower.includes('确认') || lower.includes('结账') || lower.includes('买单')) {
                if (cart.length === 0) return '❌ 购物车是空的，请先点餐~';
                const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
                const list = cart.map(i => `${i.name} x${i.quantity}`).join('、');
                cart = [];
                updateCartUI();
                return `🎉 **订单提交成功！**\n\n${list}\n\n💰 合计：¥${total.toFixed(2)}\n\n请到前台结账，祝您用餐愉快！🍽️`;
            }
            if (lower.includes('帮助') || lower.includes('怎么用') || lower.includes('help')) {
                return '🤖 **我可以帮您：**\n\n【点餐】\n• "给我看看菜单"\n• "推荐招牌菜"\n• "来一份xxx"\n• "查看购物车"\n• "下单"\n\n【查询】\n• "门店地址"\n• "WiFi密码"\n• "营业时间"\n• "停车信息"\n\n【排队】\n• "帮我排个3人桌"';
            }
            return '😊 您好！有什么可以帮您的？\n\n您可以试试：\n• "给我看看菜单"\n• "推荐招牌菜"\n• "WiFi密码"';
        }

        function handleActions(actions) {
            actions.forEach(action => {
                if (action.type === 'show_menu' && action.data) {
                    dishes = action.data;
                    renderMenuCategories();
                    renderMenuDishes();
                }
                if (action.type === 'add_to_cart' && action.data) {
                    const d = action.data.dish || action.data;
                    const existing = cart.find(item => item.id === d.id);
                    if (existing) {
                        existing.quantity += action.data.quantity || 1;
                    } else {
                        cart.push({ id: d.id, name: d.name, price: d.price, quantity: action.data.quantity || 1 });
                    }
                    updateCartUI();
                }
                if (action.type === 'clear_cart') {
                    cart = [];
                    updateCartUI();
                }
                if (action.type === 'create_order') {
                    cart = [];
                    updateCartUI();
                }
            });
        }

        function addMessage(type, content) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = 'message ' + type;
            div.innerHTML = content.replace(/\n/g, '<br>').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typing-indicator';
            div.innerHTML = '<span></span><span></span><span></span>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 80) + 'px';
        }

        // 菜单面板
        function toggleMenu() {
            document.getElementById('menu-panel').classList.toggle('active');
            renderMenuCategories();
            renderMenuDishes();
        }

        function renderMenuCategories() {
            const container = document.getElementById('menu-categories');
            const cats = ['全部', ...new Set(dishes.map(d => d.category))];
            container.innerHTML = cats.map(c => 
                `<button class="menu-cat-btn" onclick="filterMenu('${c}', this)">${c}</button>`
            ).join('');
            if (container.firstChild) container.firstChild.classList.add('active');
        }

        function filterMenu(cat, btn) {
            document.querySelectorAll('.menu-cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMenuDishes(cat);
        }

        function renderMenuDishes(category) {
            const container = document.getElementById('menu-body');
            let filtered = dishes;
            if (category && category !== '全部') {
                filtered = dishes.filter(d => d.category === category);
            }
            container.innerHTML = filtered.map(d => `
                <div class="menu-dish">
                    <div class="emoji">${d.emoji || '🍽️'}</div>
                    <div class="info">
                        <div class="name">${d.name}</div>
                        <div class="desc">${d.desc || ''}</div>
                        <div class="price">¥${d.price}</div>
                    </div>
                    <button class="action-btn" onclick="addDishToCart(${d.id}, '${d.name}', ${d.price})">+ 加入</button>
                </div>
            `).join('');
        }

        function addDishToCart(id, name, price) {
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ id, name, price, quantity: 1 });
            }
            updateCartUI();
            addMessage('system', `✅ 已添加 ${name} ¥${price}`);
        }

        // 购物车面板
        function toggleCart() {
            document.getElementById('cart-panel').classList.toggle('active');
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-body');
            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#6b7280;">🛒 购物车是空的</div>';
                return;
            }
            container.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <div class="name">${item.name}</div>
                    <div class="price">¥${(item.price * item.quantity).toFixed(2)}</div>
                    <div class="qty-control">
                        <button class="qty-btn" onclick="changeQty(${i}, -1)">−</button>
                        <div class="qty-num">${item.quantity}</div>
                        <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
                    </div>
                </div>
            `).join('');
            const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
            document.getElementById('cart-total-footer').textContent = total.toFixed(2);
        }

        function changeQty(index, delta) {
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            updateCartUI();
            renderCart();
        }

        function clearCart() {
            cart = [];
            updateCartUI();
            renderCart();
            addMessage('system', '🗑️ 购物车已清空');
        }

        function checkout() {
            if (cart.length === 0) return;
            const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
            const list = cart.map(i => `${i.name} x${i.quantity}`).join('、');
            cart = [];
            updateCartUI();
            renderCart();
            document.getElementById('cart-panel').classList.remove('active');
            addMessage('ai', `🎉 **订单提交成功！**\n\n${list}\n\n💰 合计：¥${total.toFixed(2)}\n\n请到前台结账，祝您用餐愉快！🍽️`);
        }

        function updateCartUI() {
            const total = cart.reduce((s, i) => s + i.quantity, 0);
            const badge = document.getElementById('cart-badge-header');
            if (total > 0) {
                badge.style.display = 'inline';
                badge.textContent = total;
            } else {
                badge.style.display = 'none';
            }
        }

        // 回车发送
        document.getElementById('chat-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        init();
    </script>
</body>
</html>
