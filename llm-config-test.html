<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM配置测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 30px;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section h2 {
            color: #1a1a2e;
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .api-endpoint {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        
        .api-endpoint code {
            color: #e65100;
            font-size: 14px;
            word-break: break-all;
        }
        
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        .status.success {
            background: #e8f5e9;
            border: 1px solid #4caf50;
            color: #2e7d32;
        }
        
        .status.error {
            background: #ffebee;
            border: 1px solid #f44336;
            color: #c62828;
        }
        
        .status.loading {
            background: #fff3e0;
            border: 1px solid #ff9800;
            color: #e65100;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }
        
        .form-group select,
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e8eaf6;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f4ff;
            color: #667eea;
        }
        
        .btn-secondary:hover {
            background: #e8eaf6;
        }
        
        .providers-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .provider-card {
            background: white;
            border: 2px solid #e8eaf6;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .provider-card.configured {
            border-color: #4caf50;
            background: #e8f5e9;
        }
        
        .provider-card .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .provider-card .name {
            font-weight: 600;
            color: #1a1a2e;
        }
        
        .provider-card .status-text {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        
        .provider-card.configured .status-text {
            color: #2e7d32;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .toast.success {
            background: #4caf50;
        }
        
        .toast.error {
            background: #f44336;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 LLM配置测试页面</h1>
            <p>用于测试雨姗AI收银助手的大模型配置功能</p>
        </div>
        
        <div class="content">
            <!-- API端点信息 -->
            <div class="section">
                <h2>📡 API端点</h2>
                <div class="api-endpoint">
                    <strong>获取提供商列表：</strong>
                    <code id="providers-url"></code>
                </div>
                <div class="api-endpoint">
                    <strong>获取配置状态：</strong>
                    <code id="status-url"></code>
                </div>
                <div class="api-endpoint">
                    <strong>保存配置：</strong>
                    <code id="config-url"></code>
                </div>
                <div class="api-endpoint">
                    <strong>测试连接：</strong>
                    <code id="test-url"></code>
                </div>
            </div>
            
            <!-- 状态显示 -->
            <div class="section">
                <h2>📊 配置状态</h2>
                <div id="status-display" class="status loading">
                    正在加载配置状态...
                </div>
            </div>
            
            <!-- 提供商列表 -->
            <div class="section">
                <h2>🛠️ 大模型提供商</h2>
                <div id="providers-display" class="providers-list">
                    正在加载提供商列表...
                </div>
            </div>
            
            <!-- 配置表单 -->
            <div class="section">
                <h2>⚙️ 配置DeepSeek</h2>
                <div class="form-group">
                    <label>API Key *</label>
                    <input type="password" id="api-key" placeholder="请输入DeepSeek API Key">
                </div>
                <div class="form-group">
                    <label>API Base URL</label>
                    <input type="text" id="base-url" value="https://api.deepseek.com/v1" placeholder="API Base URL">
                </div>
                <div class="form-group">
                    <label>模型</label>
                    <select id="model">
                        <option value="deepseek-chat">deepseek-chat</option>
                        <option value="deepseek-r1-chat">deepseek-r1-chat</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>API协议格式</label>
                    <select id="api-type">
                        <option value="openai">OpenAI 兼容</option>
                        <option value="anthropic">Anthropic 兼容</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
                <button class="btn btn-secondary" onclick="testConnection()">🔌 测试连接</button>
                <button class="btn btn-secondary" onclick="refreshStatus()">🔄 刷新状态</button>
            </div>
            
            <!-- 操作日志 -->
            <div class="section">
                <h2>📝 操作日志</h2>
                <div id="log-display" style="background: #f8f9fa; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto;">
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>雨姗AI收银助手 v5.0.0 | LLM配置测试工具</p>
        </div>
    </div>
    
    <div id="toast" class="toast" style="display: none;"></div>
    
    <script>
        const API_BASE = 'http://localhost:3000/api/v1/llm-config';
        
        // 初始化URL显示
        document.getElementById('providers-url').textContent = API_BASE + '/providers';
        document.getElementById('status-url').textContent = API_BASE + '/status';
        document.getElementById('config-url').textContent = API_BASE + '/config';
        document.getElementById('test-url').textContent = API_BASE + '/test';
        
        // 日志函数
        function log(message, type = 'info') {
            const logDisplay = document.getElementById('log-display');
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
            const line = document.createElement('div');
            line.innerHTML = `<span style="color: #888;">[${timestamp}]</span> ${prefix} ${message}`;
            logDisplay.insertBefore(line, logDisplay.firstChild);
        }
        
        // Toast提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
        
        // 加载状态
        async function refreshStatus() {
            try {
                const response = await fetch(API_BASE + '/status');
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    let html = '';
                    
                    if (data.enabled) {
                        html += `<p><strong>✅ AI助手已启用</strong></p>`;
                        html += `<p>当前提供商: ${data.provider}</p>`;
                    } else {
                        html += `<p><strong>⚠️ AI助手未启用</strong></p>`;
                    }
                    
                    document.getElementById('status-display').className = 'status ' + (data.enabled ? 'success' : 'error');
                    document.getElementById('status-display').innerHTML = html;
                    log('状态刷新成功', 'success');
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                document.getElementById('status-display').className = 'status error';
                document.getElementById('status-display').innerHTML = `<p><strong>❌ 加载失败</strong></p><p>${error.message}</p>`;
                log('状态加载失败: ' + error.message, 'error');
            }
        }
        
        // 加载提供商列表
        async function loadProviders() {
            try {
                const response = await fetch(API_BASE + '/providers');
                const result = await response.json();
                
                if (result.success) {
                    const providers = result.providers;
                    let html = '';
                    
                    providers.forEach(p => {
                        html += `
                            <div class="provider-card">
                                <div class="icon">${p.icon}</div>
                                <div class="name">${p.name}</div>
                                <div class="status-text">${p.apiType} | ${p.requiresSecret ? '需要密钥' : '仅需API Key'}</div>
                            </div>
                        `;
                    });
                    
                    document.getElementById('providers-display').innerHTML = html;
                    log('提供商列表加载成功，共' + providers.length + '个', 'success');
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                document.getElementById('providers-display').innerHTML = `<p style="color: #c62828;">加载失败: ${error.message}</p>`;
                log('提供商列表加载失败: ' + error.message, 'error');
            }
        }
        
        // 保存配置
        async function saveConfig() {
            const apiKey = document.getElementById('api-key').value.trim();
            const baseUrl = document.getElementById('base-url').value.trim();
            const model = document.getElementById('model').value;
            const apiType = document.getElementById('api-type').value;
            
            if (!apiKey) {
                showToast('请输入API Key', 'error');
                return;
            }
            
            if (apiKey.length < 10) {
                showToast('API Key格式不正确', 'error');
                return;
            }
            
            try {
                const response = await fetch(API_BASE + '/config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        provider: 'deepseek',
                        apiKey: apiKey,
                        baseUrl: baseUrl,
                        model: model,
                        apiType: apiType
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('✅ 配置保存成功！', 'success');
                    log('配置保存成功: ' + JSON.stringify(result.data), 'success');
                    refreshStatus();
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                showToast('❌ 保存失败: ' + error.message, 'error');
                log('配置保存失败: ' + error.message, 'error');
            }
        }
        
        // 测试连接
        async function testConnection() {
            const apiKey = document.getElementById('api-key').value.trim();
            const baseUrl = document.getElementById('base-url').value.trim();
            const model = document.getElementById('model').value;
            const apiType = document.getElementById('api-type').value;
            
            if (!apiKey) {
                showToast('请输入API Key', 'error');
                return;
            }
            
            log('正在测试连接...');
            
            try {
                const response = await fetch(API_BASE + '/test', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        provider: 'deepseek',
                        apiKey: apiKey,
                        baseUrl: baseUrl,
                        model: model,
                        apiType: apiType
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('✅ 连接成功！延迟: ' + result.latency + 'ms', 'success');
                    log('连接测试成功，延迟: ' + result.latency + 'ms', 'success');
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                showToast('❌ 连接失败: ' + error.message, 'error');
                log('连接测试失败: ' + error.message, 'error');
            }
        }
        
        // 页面加载时自动刷新
        window.onload = function() {
            refreshStatus();
            loadProviders();
            log('测试页面已加载');
        };
    </script>
</body>
</html>
