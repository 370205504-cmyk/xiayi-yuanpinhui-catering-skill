## 📊 菜品数据

当前项目包含 **120道菜品**，分为6大类：

- 招牌菜：4道
- 特色硬菜：21道
- 宴请首选菜：20道
- 餐前开胃菜：32道
- 家常炒菜：24道
- 汤羹/主食/饮品：19道

菜品数据位于 `lambda/data/dishes.json`。

