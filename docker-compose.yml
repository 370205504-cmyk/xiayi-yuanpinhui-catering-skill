version: '3.8'

services:
  app:
    build: .
    container_name: xiayi-foodie-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-xiayi2024}
      - DB_NAME=xiayi_restaurant
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-admin-secret-key-change-in-production}
    volumes:
      - ./lambda/data:/workspace/lambda/data
      - ./lambda/logs:/workspace/lambda/logs
      - ./lambda/uploads:/workspace/lambda/uploads
      - ./backups:/workspace/backups
      - ./logs:/workspace/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - xiayi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql:
    image: mysql:8.0
    container_name: xiayi-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-xiayi2024}
      - MYSQL_DATABASE=xiayi_restaurant
    volumes:
      - mysql_data:/var/lib/mysql
      - ./lambda/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - xiayi-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-xiayi2024}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xiayi-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - xiayi-network
    command: redis-server --appendonly yes

networks:
  xiayi-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
