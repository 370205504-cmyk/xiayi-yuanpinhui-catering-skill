{
  "description": "Foodie Chef Alexa Skill - CloudFormation infrastructure template with Text API",
  "Resources": {
    "FoodieChefLambdaFunction": {
      "Type": "AWS::Lambda::Function",
      "Properties": {
        "FunctionName": "FoodieChefSkill",
        "Handler": "index.handler",
        "Role": {
          "Fn::GetAtt": ["LambdaExecutionRole", "Arn"]
        },
        "Code": {
          "S3Bucket": "ask-custom-skill-deployment-bucket",
          "S3Key": "foodie-chef/lambda.zip"
        },
        "Runtime": "nodejs18.x",
        "Timeout": 15,
        "MemorySize": 256,
        "Environment": {
          "Variables": {
            "SKILL_NAME": "FoodieChef",
            "SKILL_ID": "foodie-chef-skill"
          }
        }
      }
    },
    "LambdaExecutionRole": {
      "Type": "AWS::IAM::Role",
      "Properties": {
        "RoleName": "FoodieChefLambdaRole",
        "AssumeRolePolicyDocument": {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": {
                "Service": "lambda.amazonaws.com"
              },
              "Action": "sts:AssumeRole"
            }
          ]
        },
        "ManagedPolicyArns": [
          {
            "Fn::Sub": "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
          }
        ]
      }
    },
    "TextApi": {
      "Type": "AWS::ApiGateway::RestApi",
      "Properties": {
        "Name": "FoodieChefTextApi",
        "Description": "文字交互API - 夏邑缘品荟创味菜"
      }
    },
    "TextResource": {
      "Type": "AWS::ApiGateway::Resource",
      "Properties": {
        "ParentId": {
          "Fn::GetAtt": ["TextApi", "RootResourceId"]
        },
        "PathPart": "text",
        "RestApiId": {
          "Ref": "TextApi"
        }
      }
    },
    "TextMethod": {
      "Type": "AWS::ApiGateway::Method",
      "Properties": {
        "HttpMethod": "POST",
        "ResourceId": {
          "Ref": "TextResource"
        },
        "RestApiId": {
          "Ref": "TextApi"
        },
        "AuthorizationType": "NONE",
        "Integration": {
          "Type": "AWS_PROXY",
          "IntegrationHttpMethod": "POST",
          "Uri": {
            "Fn::Sub": "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FoodieChefLambdaFunction.Arn}/invocations"
          }
        }
      }
    },
    "TextApiOptionsMethod": {
      "Type": "AWS::ApiGateway::Method",
      "Properties": {
        "HttpMethod": "OPTIONS",
        "ResourceId": {
          "Ref": "TextResource"
        },
        "RestApiId": {
          "Ref": "TextApi"
        },
        "AuthorizationType": "NONE",
        "Integration": {
          "Type": "MOCK",
          "IntegrationResponses": [
            {
              "StatusCode": "200",
              "ResponseParameters": {
                "method.response.header.Access-Control-Allow-Headers": "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'",
                "method.response.header.Access-Control-Allow-Methods": "'POST,OPTIONS'",
                "method.response.header.Access-Control-Allow-Origin": "'*'"
              }
            }
          ],
          "RequestTemplates": {
            "application/json": "{\"statusCode\": 200}"
          }
        },
        "MethodResponses": [
          {
            "StatusCode": "200",
            "ResponseParameters": {
              "method.response.header.Access-Control-Allow-Headers": true,
              "method.response.header.Access-Control-Allow-Methods": true,
              "method.response.header.Access-Control-Allow-Origin": true
            }
          }
        ]
      }
    },
    "InvokeLambdaPermission": {
      "Type": "AWS::Lambda::Permission",
      "Properties": {
        "Action": "lambda:InvokeFunction",
        "FunctionName": {
          "Fn::GetAtt": ["FoodieChefLambdaFunction", "Arn"]
        },
        "Principal": "apigateway.amazonaws.com",
        "SourceArn": {
          "Fn::Sub": "arn:aws:apigateway:${AWS::Region}:execute-api:${AWS::AccountId}:${TextApi}/*/*"
        }
      }
    },
    "WebHostingBucket": {
      "Type": "AWS::S3::Bucket",
      "Properties": {
        "BucketName": {
          "Fn::Sub": "${AWS::StackName}-web-${AWS::AccountId}"
        },
        "WebsiteConfiguration": {
          "IndexDocument": "index.html",
          "ErrorDocument": "index.html"
        },
        "PublicAccessBlockConfiguration": {
          "BlockPublicAcls": false,
          "IgnorePublicAcls": false,
          "BlockPublicPolicy": false,
          "RestrictPublicBuckets": false
        }
      }
    },
    "WebHostingBucketPolicy": {
      "Type": "AWS::S3::BucketPolicy",
      "Properties": {
        "Bucket": {
          "Ref": "WebHostingBucket"
        },
        "PolicyDocument": {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Sid": "PublicReadGetObject",
              "Effect": "Allow",
              "Principal": "*",
              "Action": "s3:GetObject",
              "Resource": {
                "Fn::Sub": "${WebHostingBucket.Arn}/*"
              }
            }
          ]
        }
      }
    }
  },
  "Outputs": {
    "LambdaArn": {
      "Description": "ARN of the Foodie Chef Lambda function",
      "Value": {
        "Fn::GetAtt": ["FoodieChefLambdaFunction", "Arn"]
      }
    },
    "TextApiId": {
      "Description": "文字API ID",
      "Value": {
        "Ref": "TextApi"
      }
    },
    "TextApiEndpoint": {
      "Description": "文字API调用地址",
      "Value": {
        "Fn::Sub": "https://${TextApi}.execute-api.${AWS::Region}.amazonaws.com/prod/text"
      }
    },
    "WebHostingUrl": {
      "Description": "Web界面访问地址",
      "Value": {
        "Fn::GetAtt": ["WebHostingBucket", "WebsiteURL"]
      }
    },
    "WebHostingBucketName": {
      "Description": "Web托管S3桶名称",
      "Value": {
        "Ref": "WebHostingBucket"
      }
    }
  }
}
